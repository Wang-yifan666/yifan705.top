<html lang="zh-CN">

<body>
  <!-- 水波纹画布背景 -->
  <canvas id="ripple-canvas"></canvas>

  <header>
    <div class="header-content">
      <h1>yifan</h1>
    </div>
  </header>

  <section class="main-content">
    <div>
      <div class="button-container">
        <a href="blog.html" class="button left">个人博客</a>
        <a href="showcase.html" class="button right">项目展示</a>
      </div>

      <div class="github-link-box">
        <p>GitHub 仓库地址：</p>
        <a href="https://github.com/Wang-yifan666" target="_blank">
          https://github.com/Wang-yifan666
        </a>
      </div>
    </div>
  </section>

  <footer>
    <p>© 2026 yifan. All rights reserved.</p>
  </footer>

  <script>
    // ============================================================
    // 水波纹物理模拟 — 连续水面效果
    // ============================================================

    const canvas = document.getElementById('ripple-canvas');
    const ctx = canvas.getContext('2d');

    // ---- 物理参数 ----
    const RES = 8;               // 网格分辨率
    const DAMPING = 0.992;       // 阻尼
    const BASE_COLOR = '#78c8e8';

    let cols, rows;
    let current, previous;       // Verlet 双缓冲

    let animId;

    // ---- 点击涟漪光晕数组 ----
    let clickRipples = [];

    // ---- 自适应尺寸 ----
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      cols = Math.floor(canvas.width / RES) + 2;
      rows = Math.floor(canvas.height / RES) + 2;
      const total = cols * rows;
      current = new Float32Array(total);
      previous = new Float32Array(total);
    }
    window.addEventListener('resize', resize);
    resize();

    // ---- 在鼠标/触摸位置产生涟漪 ----
    // radiusMultiplier: 默认 1（移动），点击时传 2~2.5（大涟漪）
    function splashAt(x, y, strength, radiusMultiplier = 1) {
      const col = Math.round(x / RES);
      const row = Math.round(y / RES);
      const radius = Math.round(4 * radiusMultiplier);
      for (let di = -radius; di <= radius; di++) {
        for (let dj = -radius; dj <= radius; dj++) {
          const ci = col + di;
          const rj = row + dj;
          if (ci >= 1 && ci < cols - 1 && rj >= 1 && rj < rows - 1) {
            const dist = Math.sqrt(di * di + dj * dj);
            if (dist <= radius) {
              const factor = 1 - dist / radius;
              previous[ci + rj * cols] += strength * factor * factor;
            }
          }
        }
      }
    }

    // ---- 鼠标交互（将事件绑定到 document，让 canvas 保持 pointer-events: none） ----
    let lastMouseX = -9999, lastMouseY = -9999;

    function getCanvasXY(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      return { x: clientX - rect.left, y: clientY - rect.top };
    }

    document.addEventListener('mousemove', (e) => {
      const { x, y } = getCanvasXY(e.clientX, e.clientY);
      // 鼠标移动时产生持续涟漪
      splashAt(x, y, 0.8);
      lastMouseX = x;
      lastMouseY = y;
    });

    document.addEventListener('mouseleave', () => {
      lastMouseX = -9999;
      lastMouseY = -9999;
    });

    // ---- 点击产生强水波纹 ----
    document.addEventListener('click', (e) => {
      const { x, y } = getCanvasXY(e.clientX, e.clientY);
      // 点击时产生强涟漪：高力度 + 大半径
      splashAt(x, y, 6.0, 2.5);
      // 记录光晕动画
      clickRipples.push({
        x, y,
        radius: 0,
        maxRadius: 60 + Math.random() * 30,
        life: 1.0
      });
    });

    // ---- 触摸支持 ----
    document.addEventListener('touchmove', (e) => {
      const touch = e.touches[0];
      const { x, y } = getCanvasXY(touch.clientX, touch.clientY);
      splashAt(x, y, 1.0);
    }, { passive: true });

    document.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      const { x, y } = getCanvasXY(touch.clientX, touch.clientY);
      // 触摸点击也产生强涟漪
      splashAt(x, y, 6.0, 2.5);
      clickRipples.push({
        x, y,
        radius: 0,
        maxRadius: 60 + Math.random() * 30,
        life: 1.0
      });
    }, { passive: true });

    // ---- 自动涟漪（让水面始终有波动） ----
    let autoTimer = 0;
    function autoSplash() {
      const x = Math.random() * canvas.width;
      const y = Math.random() * canvas.height;
      splashAt(x, y, 0.5 + Math.random() * 0.8);
    }

    // ---- 波动传播（Verlet 积分） ----
    function updateWaves() {
      for (let i = 1; i < cols - 1; i++) {
        for (let j = 1; j < rows - 1; j++) {
          const idx = i + j * cols;
          const laplacian = (
            previous[(i - 1) + j * cols] +
            previous[(i + 1) + j * cols] +
            previous[i + (j - 1) * cols] +
            previous[i + (j + 1) * cols]
          ) * 0.5 - previous[idx];
          current[idx] = laplacian + current[idx];
          current[idx] *= DAMPING;
        }
      }
      [current, previous] = [previous, current];
    }

    // ---- 渲染 ----
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 背景渐变（深邃的水底感）
      const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0, '#b0e4f8');
      grad.addColorStop(0.4, '#78c8e8');
      grad.addColorStop(1, '#4080b0');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // ---- 绘制连续水面 ----
      // 用网格绘制四边形，每个格子根据四角波高着色
      for (let i = 0; i < cols - 1; i++) {
        for (let j = 0; j < rows - 1; j++) {
          const h00 = previous[i + j * cols];
          const h10 = previous[(i + 1) + j * cols];
          const h01 = previous[i + (j + 1) * cols];
          const h11 = previous[(i + 1) + (j + 1) * cols];

          const avgH = (h00 + h10 + h01 + h11) * 0.25;
          const maxH = Math.max(Math.abs(h00), Math.abs(h10), Math.abs(h01), Math.abs(h11));

          // 高度映射到 -1~1
          const norm = Math.max(-1, Math.min(1, avgH));

          // === 色彩计算 ===
          // 波峰 → 亮白透明；波谷 → 幽蓝深邃
          const lightness = 55 + norm * 35;   // 20%~90%
          const sat = 75 - Math.abs(norm) * 35; // 波峰饱和度降低（偏白）

          ctx.fillStyle = `hsl(198, ${sat}%, ${lightness}%)`;
          ctx.globalAlpha = 0.55 + Math.abs(norm) * 0.35;

          // 绘制四边形（根据波高产生折射偏移，模拟水面起伏）
          const x = i * RES;
          const y = j * RES;
          const shiftScale = 2.5;
          const shift00 = h00 * shiftScale;
          const shift10 = h10 * shiftScale;
          const shift01 = h01 * shiftScale;
          const shift11 = h11 * shiftScale;

          ctx.beginPath();
          ctx.moveTo(x + shift00, y + shift00);
          ctx.lineTo(x + RES + shift10, y + shift10);
          ctx.lineTo(x + RES + shift11, y + RES + shift11);
          ctx.lineTo(x + shift01, y + RES + shift01);
          ctx.closePath();
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;

      // ---- 高光线：隔行画白色波浪线 ----
      ctx.strokeStyle = `rgba(255, 255, 255, 0.10)`;
      ctx.lineWidth = 1.5;
      for (let j = 1; j < rows; j += 2) {
        ctx.beginPath();
        for (let i = 0; i < cols; i++) {
          const h = previous[i + j * cols];
          const x = i * RES;
          const y = j * RES + h * 3.5;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }

      // ---- 镜面高光：在波峰隆起处画白色光点 ----
      for (let i = 2; i < cols - 2; i += 2) {
        for (let j = 2; j < rows - 2; j += 2) {
          const h = previous[i + j * cols];
          if (h > 0.3) {
            const intensity = Math.min(1, h * 0.6);
            const x = i * RES;
            const y = j * RES + h * 3;
            ctx.beginPath();
            ctx.arc(x, y, 2 + intensity * 4, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${intensity * 0.4})`;
            ctx.fill();
          }
        }
      }

      // ---- 点击涟漪光晕（扩散动画） ----
      for (let r = clickRipples.length - 1; r >= 0; r--) {
        const rip = clickRipples[r];
        rip.radius += (rip.maxRadius - rip.radius) * 0.08;
        rip.life -= 0.012;

        if (rip.life <= 0) {
          clickRipples.splice(r, 1);
          continue;
        }

        // 外圈光晕
        const grad2 = ctx.createRadialGradient(
          rip.x, rip.y, 0,
          rip.x, rip.y, rip.radius
        );
        grad2.addColorStop(0, `rgba(255, 255, 255, ${rip.life * 0.25})`);
        grad2.addColorStop(0.5, `rgba(200, 230, 255, ${rip.life * 0.10})`);
        grad2.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = grad2;
        ctx.beginPath();
        ctx.arc(rip.x, rip.y, rip.radius, 0, Math.PI * 2);
        ctx.fill();

        // 内圈高光
        ctx.beginPath();
        ctx.arc(rip.x, rip.y, rip.radius * 0.15, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${rip.life * 0.3})`;
        ctx.fill();
      }

      // ---- 鼠标跟随：在鼠标周围画一圈涟漪高光 ----
      if (lastMouseX > 0 && lastMouseY > 0) {
        const r = 18;
        const grad3 = ctx.createRadialGradient(
          lastMouseX, lastMouseY, 0,
          lastMouseX, lastMouseY, r
        );
        grad3.addColorStop(0, 'rgba(255, 255, 255, 0.18)');
        grad3.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = grad3;
        ctx.beginPath();
        ctx.arc(lastMouseX, lastMouseY, r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // ---- 主循环 ----
    function animate(time) {
      updateWaves();

      // 每 1.5 秒自动生成一个涟漪
      if (!autoTimer || time - autoTimer > 1500) {
        autoSplash();
        autoTimer = time;
      }

      draw();
      animId = requestAnimationFrame(animate);
    }

    animate(0);
  </script>

</body>
</html>
